<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Element Delivery Zones — Old vs New Pricing + Contracts</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; }
#map { width: 100%; height: 100vh; }

.legend {
  background: white; padding: 14px 18px; border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); line-height: 1.8;
  font-size: 13px; max-width: 220px;
}
.legend h4 { margin-bottom: 6px; font-size: 14px; color: #1a1a2e; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.2); flex-shrink: 0; }
.legend-rect { width: 14px; height: 14px; border-radius: 3px; opacity: 0.5; border: 2px solid rgba(0,0,0,0.3); flex-shrink: 0; }
.legend hr { margin: 6px 0; border: none; border-top: 1px solid #ddd; }

.info-panel {
  background: white; padding: 14px 18px; border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); font-size: 13px;
  max-width: 320px;
}
.info-panel h4 { font-size: 15px; color: #1a1a2e; margin-bottom: 4px; }
.info-panel .subtitle { color: #666; font-size: 12px; margin-bottom: 8px; }
.toggle-row { display: flex; gap: 12px; margin-top: 6px; }
.toggle-btn {
  padding: 6px 14px; border-radius: 6px; border: 2px solid #ccc;
  background: #f5f5f5; cursor: pointer; font-size: 12px; font-weight: 600;
  transition: all 0.2s;
}
.toggle-btn.active-new { background: #0B3D91; color: white; border-color: #0B3D91; }
.toggle-btn.active-old { background: #8B4513; color: white; border-color: #8B4513; }
.toggle-btn.active-rev { background: #253494; color: white; border-color: #253494; }
.toggle-btn:hover { opacity: 0.85; }
.co-chip { padding: 4px 10px; font-size: 11px; border-width: 1.5px; }
.co-chip.active { background: #0B3D91; color: white; border-color: #0B3D91; }
.co-label { font-size: 10px; color: #888; margin: 6px 0 2px; text-transform: uppercase; letter-spacing: 0.5px; }

.leaflet-popup-content { max-height: 70vh; overflow-y: auto; }
.city-popup .popup-title { font-weight: 700; font-size: 14px; color: #1a1a2e; }
.city-popup .popup-band { font-size: 12px; color: #666; margin: 2px 0 6px; }
.city-popup .popup-price { font-size: 18px; font-weight: 700; }
.city-popup .popup-compare { margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; font-size: 12px; color: #666; }
.city-popup .delta-up { color: #c0392b; }
.city-popup .delta-down { color: #27ae60; }
.city-popup .delta-same { color: #888; }

.leaflet-tooltip.price-label {
  background: transparent; border: none; box-shadow: none;
  font-weight: 700; font-size: 11px; color: #333;
  text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
  padding: 0;
}
.leaflet-tooltip.delta-label-up {
  color: #c0392b; font-size: 10px; font-weight: 800;
}
.leaflet-tooltip.delta-label-down {
  color: #27ae60; font-size: 10px; font-weight: 800;
}
.leaflet-tooltip.delta-label-same {
  color: #888; font-size: 10px; font-weight: 700;
}

.timeline-panel {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: rgba(255,255,255,0.95); border-radius: 10px;
  padding: 16px 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  font-family: 'Segoe UI', sans-serif; min-width: 520px;
  border: 1px solid #ddd;
}
.timeline-panel h4 { margin: 0 0 6px 0; font-size: 13px; color: #2c3e50; }
.timeline-panel .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-top: 2px; }
.timeline-panel .range-display { font-size: 12px; font-weight: 600; color: #2c3e50; margin-bottom: 6px; text-align: center; }
.timeline-panel input[type=range] { width: 100%; margin: 2px 0; height: 24px; cursor: pointer; }
.timeline-panel input[type=range]::-webkit-slider-thumb { width: 18px; height: 18px; }
.timeline-panel input[type=range]::-webkit-slider-runnable-track { height: 8px; }
.slider-row { display: flex; gap: 8px; align-items: center; }
.slider-row label { font-size: 12px; color: #555; white-space: nowrap; min-width: 40px; font-weight: 600; }
.slider-row input[type=range] { flex: 1; }
.timeline-panel .rev-total { font-size: 11px; color: #888; margin-top: 4px; text-align: center; }

.venue-row { cursor: pointer; }
.venue-row:hover { background: #f0f7ff; }
.venue-row td { white-space: nowrap; }
.venue-detail { display: none; }
.venue-detail.open { display: table-row; }
.venue-detail td { padding: 0 !important; }
.event-table { width: 100%; border-collapse: collapse; background: #fafafa; }
.event-table th { font-size: 10px; padding: 4px 8px; text-align: center; color: #888; border-bottom: 1px solid #eee; white-space: nowrap; }
.event-table th:first-child { text-align: left; }
.event-table th:nth-child(2) { text-align: center; padding: 4px 12px; }
.event-table td { font-size: 11px; padding: 4px 8px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
.event-table td:nth-child(2) { text-align: center; padding: 4px 12px; }
.event-table td:nth-child(3), .event-table td:nth-child(4) { text-align: center; }
.event-table td:nth-child(5), .event-table td:nth-child(6) { text-align: center; }
.event-table tr.evt-d td:first-child { border-left: 3px solid #2171b5; }
.event-table tr.evt-p td:first-child { border-left: 3px solid #c87f0a; }
.venue-expand { font-size: 9px; color: #999; margin-left: 4px; }

.contract-filter {
  display: none; margin-top: 8px; padding: 0;
}
.contract-filter.visible { display: block; }
.contract-filter-row { display: flex; gap: 4px; margin-top: 4px; }
.cf-btn {
  padding: 3px 10px; border-radius: 4px; border: 2px solid #ccc;
  background: #f5f5f5; cursor: pointer; font-size: 11px; font-weight: 600;
  transition: all 0.15s; flex: 1; text-align: center;
}
.cf-btn.cf-all { background: #253494; color: white; border-color: #253494; }
.cf-btn.cf-closed { background: #253494; color: white; border-color: #253494; }
.cf-btn.cf-open { background: #253494; color: white; border-color: #253494; }
.cf-btn:hover { opacity: 0.85; }
.quick-jump { margin-top: 8px; }
.quick-jump-label { font-size: 10px; color: #666; font-weight: 600; margin-bottom: 3px; }
.quick-jump-row { display: flex; gap: 4px; flex-wrap: wrap; }
.qj-btn {
  padding: 3px 9px; border-radius: 4px; border: 1.5px solid #ccc;
  background: #f5f5f5; cursor: pointer; font-size: 11px; font-weight: 600;
  transition: all 0.15s; white-space: nowrap;
}
.qj-btn:hover { background: #e0e7ff; border-color: #6366f1; }
.qj-btn.qj-active { background: #253494; color: white; border-color: #253494; }

.contract-detail-card {
  margin: 4px 0; padding: 6px 8px; background: #f8fafc; border-radius: 5px;
  border-left: 3px solid #253494; font-size: 11px; line-height: 1.5;
  max-width: 450px;
}
.contract-detail-card .cd-header { font-weight: 700; color: #1a1a2e; font-size: 12px; margin-bottom: 3px; }
.contract-detail-card .cd-row { display: flex; gap: 6px; }
.contract-detail-card .cd-label { color: #666; min-width: 70px; font-size: 10px; }
.contract-detail-card .cd-value { font-weight: 600; color: #1a1a2e; }
.contract-detail-card .cd-notes { margin-top: 4px; padding: 3px 6px; background: #fef3c7;
  border-radius: 3px; font-size: 10px; color: #92400e; font-style: italic; }
.contract-num-link { color: #1a73e8; text-decoration: underline; cursor: pointer; }
.contract-num-link:hover { color: #0d47a1; }
.cd-inline { display: none; }
.cd-inline.cd-open { display: block; }



.future-indicator {
  display: none; margin-top: 4px; padding: 3px 8px;
  background: #fef3c7; border-radius: 4px; font-size: 10px;
  color: #92400e; text-align: center; font-weight: 600;
}
.future-indicator.visible { display: block; }

/* ===== LOADING SPINNER ===== */
#loading-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #f7f9f8; z-index: 99998;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  transition: opacity 0.3s ease;
}
#loading-overlay.fade-out { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 44px; height: 44px; border: 4px solid #e0e0e0;
  border-top: 4px solid #1a3c34; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay .loading-text {
  font-size: 14px; color: #666; font-weight: 600;
}

/* ===== GPS LOCATE BUTTON ===== */
.leaflet-control-locate {
  background: white; border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.leaflet-control-locate a {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; cursor: pointer;
  text-decoration: none; color: #333;
  border-radius: 6px; background: white;
  transition: background 0.2s;
}
.leaflet-control-locate a:hover { background: #f0f0f0; }
.leaflet-control-locate a svg { width: 20px; height: 20px; }
.leaflet-control-locate.locating a { background: #e8f5e9; }

/* ===== MOBILE RESPONSIVE STYLES ===== */

/* Collapsible panel toggle buttons */
.mobile-collapse-btn {
  display: none;
  width: 100%; padding: 8px 12px; margin-bottom: 6px;
  background: #1a3c34; color: white; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  text-align: left;
}
.mobile-collapse-btn::after {
  content: ' ▾'; float: right;
}
.mobile-collapse-btn.collapsed::after {
  content: ' ▸';
}

@media screen and (max-width: 768px) {
  /* Hide +/- zoom controls on mobile — users can pinch-to-zoom */
  .leaflet-control-zoom { display: none !important; }

  /* Hide timeline range sliders on mobile — use quick-select preset buttons instead */
  .timeline-panel .slider-row { display: none !important; }
  .timeline-panel .range-labels { display: none !important; }

  /* Info-panel (pricing/heatmap layers) collapsible toggle */
  .info-panel .info-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a3c34; border: none; padding: 0 14px;
    font-size: 13px; font-weight: 700; color: white;
    cursor: pointer; width: 100%; text-align: left;
    min-height: 44px; line-height: 44px;
    border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .info-panel .info-toggle::after { content: '▾'; font-size: 14px; }
  .info-panel.info-collapsed .info-toggle::after { content: '▸'; }
  .info-panel.info-collapsed .info-content { display: none; }
  .info-panel.info-collapsed {
    padding: 6px !important;
    max-width: 150px !important;
  }
  .info-panel .info-content { margin-top: 6px; }

  /* Relocate legend to top-right (below GPS locate button) on mobile so it doesn't hide behind the timeline panel */
  .leaflet-bottom.leaflet-left {
    bottom: auto !important;
    left: auto !important;
    top: 64px !important;
    right: 10px !important;
    z-index: 1002 !important; /* above timeline-panel (1001) */
  }

  /* Map fills screen */
  #map { height: 100vh; height: 100dvh; }

  /* Info panel (top-left toggle buttons) */
  .info-panel {
    max-width: calc(100vw - 100px) !important;
    padding: 10px 12px !important;
    font-size: 12px !important;
  }
  .info-panel h4 { font-size: 13px !important; }
  .info-panel .subtitle { font-size: 11px !important; }
  .toggle-row { gap: 6px !important; }
  .toggle-btn {
    padding: 8px 10px !important;
    font-size: 11px !important;
    min-height: 40px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Legend panel (bottom-left) — collapsible on mobile */
  .legend {
    max-width: 180px !important;
    padding: 10px 12px !important;
    font-size: 12px !important;
    max-height: 50vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .legend h4 { font-size: 12px !important; }
  .legend-item { gap: 6px !important; min-height: 28px; }
  .legend.legend-collapsed .legend-content { display: none; }
  .legend .legend-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a3c34; border: none; padding: 0 14px;
    font-size: 13px; font-weight: 700; color: white;
    cursor: pointer; width: 100%; text-align: left;
    min-height: 44px; line-height: 44px;
    border-radius: 6px;
  }
  .legend .legend-toggle::after {
    content: '▾'; font-size: 14px;
  }
  .legend.legend-collapsed .legend-toggle::after {
    content: '▸';
  }
  .legend.legend-collapsed {
    padding: 6px !important;
  }

  /* Timeline panel — full width on mobile, repositioned */
  .timeline-panel {
    position: fixed !important;
    top: auto !important; bottom: 0 !important;
    left: 0 !important; right: 0 !important;
    min-width: unset !important;
    width: 100% !important;
    border-radius: 14px 14px 0 0 !important;
    padding: 12px 16px 20px !important;
    max-height: 55vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    z-index: 1001 !important;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2) !important;
  }
  .timeline-panel h4 { font-size: 12px !important; }
  .slider-row label { font-size: 11px !important; min-width: 34px !important; }
  .slider-row input[type=range] {
    height: 32px !important;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    width: 24px !important; height: 24px !important;
  }
  .quick-jump-row { gap: 6px !important; }
  .qj-btn {
    padding: 6px 10px !important;
    font-size: 11px !important;
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .contract-filter-row { flex-wrap: wrap; gap: 6px !important; }
  .cf-btn {
    padding: 6px 10px !important;
    font-size: 11px !important;
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Timeline collapse handle for mobile — large tap target */
  .timeline-collapse-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%; min-height: 44px;
    cursor: pointer;
    padding: 8px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .timeline-collapse-handle::before {
    content: '';
    display: block;
    width: 48px; height: 5px;
    background: #bbb; border-radius: 3px;
    transition: background 0.2s;
  }
  .timeline-collapse-handle:active::before { background: #888; }
  .timeline-panel.timeline-collapsed .timeline-content { display: none; }
  .timeline-panel.timeline-collapsed {
    max-height: unset;
    padding: 4px 16px 8px !important;
  }
  .timeline-panel.timeline-collapsed .timeline-collapse-handle::after {
    content: 'Tap to expand timeline';
    font-size: 11px; color: #888; margin-left: 10px; font-weight: 600;
  }

  /* Popups — wider and more readable on mobile */
  .leaflet-popup-content-wrapper {
    max-width: 90vw !important;
    border-radius: 10px !important;
  }
  .leaflet-popup-content {
    max-height: 60vh !important;
    max-width: 85vw !important;
    font-size: 13px !important;
    -webkit-overflow-scrolling: touch;
    margin: 10px 12px !important;
  }
  .city-popup .popup-title { font-size: 15px !important; }
  .city-popup .popup-price { font-size: 16px !important; }

  /* Contract detail cards */
  .contract-detail-card {
    max-width: 100% !important;
  }

  /* Event table scrollable */
  .venue-detail td { padding: 0 !important; }
  .event-table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Leaflet controls - bigger tap targets (44px per Apple HIG) */
  .leaflet-control-zoom a {
    width: 44px !important; height: 44px !important;
    line-height: 44px !important; font-size: 22px !important;
  }

  /* GPS locate button — larger on mobile */
  .leaflet-control-locate a {
    width: 44px !important; height: 44px !important;
  }
  .leaflet-control-locate a svg { width: 24px !important; height: 24px !important; }

  /* Popup close button — larger tap target */
  .leaflet-popup-close-button {
    width: 36px !important; height: 36px !important;
    font-size: 24px !important; line-height: 36px !important;
    padding: 0 !important; right: 4px !important; top: 4px !important;
  }

  /* Markers — larger tap targets on mobile */
  .leaflet-marker-icon {
    min-width: 20px; min-height: 20px;
  }

  /* Timeline collapse handle visible on mobile */
  .timeline-collapse-handle { display: flex; }

  /* Hide Customer Pickups button on mobile */
  #cf-pickup { display: none !important; }
}

/* ===== LANDSCAPE MODE ===== */
@media screen and (max-width: 768px) and (orientation: landscape) {
  .timeline-panel {
    max-height: 45vh !important;
  }
  .leaflet-popup-content {
    max-height: 45vh !important;
  }
  .legend {
    max-height: 40vh !important;
  }
}

/* Desktop: hide mobile-only elements */
@media screen and (min-width: 769px) {
  .timeline-collapse-handle { display: none; }
  .legend .legend-toggle { display: none; }
  .info-panel .info-toggle { display: none; }
}
</style>

<!-- Access is protected by Cloudflare Access (email OTP) at the edge. -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var loadingEl = document.getElementById('loading-overlay');
  if (loadingEl) loadingEl.style.display = 'flex';
  // Defer heavy map initialization with a small delay so spinner renders
  setTimeout(function() {
    if (typeof initMap === 'function') initMap();
    if (loadingEl) {
      loadingEl.classList.add('fade-out');
      setTimeout(function() { loadingEl.style.display = 'none'; }, 350);
    }
  }, 50);
});
</script>

<!-- LOADING SPINNER (shown during map initialization) -->
<div id="loading-overlay" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading map data...</div>
</div>

<div id="map"></div>
<div class="timeline-panel" id="timeline-panel" style="display:none;">
  <h4>Revenue & Contracts Timeline (2025–2026)</h4>
  <div class="range-display" id="range-display">All Weeks</div>
  <div class="slider-row">
    <label>From</label>
    <input type="range" id="slider-from" min="0" max="104" value="0" oninput="updateTimeline()">
  </div>
  <div class="slider-row">
    <label>To</label>
    <input type="range" id="slider-to" min="0" max="104" value="104" oninput="updateTimeline()">
  </div>
  <div class="range-labels" style="font-weight:600;">
    <span>Jan 2025</span>
    <span>Jul 2025</span>
    <span>Jan 2026</span>
    <span>Dec 2026</span>
  </div>
  <div class="quick-jump">
    <div class="quick-jump-label">Quick Select:</div>
    <div class="quick-jump-row">
      <div class="qj-btn" onclick="quickJump('all')">All</div>
      <div class="qj-btn" onclick="quickJump('2025')">2025</div>
      <div class="qj-btn" onclick="quickJump('2026')">2026</div>
      <div class="qj-btn" onclick="quickJump('q1')">Q1 2026</div>
      <div class="qj-btn" onclick="quickJump('q2')">Q2 2026</div>
      <div class="qj-btn" onclick="quickJump('month')">This Month</div>
      <div class="qj-btn" onclick="quickJump('week')">This Week</div>
    </div>
  </div>
  <div class="rev-total" id="rev-total"></div>
  <div class="future-indicator" id="future-indicator">Showing 2026 Contract Data</div>
  <div class="contract-filter" id="contract-filter">
    <div style="font-size:10px;color:#666;font-weight:600;margin-bottom:2px;">Contract Status Filter:</div>
    <div class="contract-filter-row">
      <div class="cf-btn cf-all" id="cf-all" onclick="setContractFilter('all')">All</div>
      <div class="cf-btn" id="cf-closed" onclick="setContractFilter('closed')">Closed</div>
      <div class="cf-btn" id="cf-open" onclick="setContractFilter('open')">Open</div>

    </div>
  </div>


<script>
function initMap() {
// ===== NEW PRICING DATA (from CityTowns sheet) =====
const newCities = [
  {name:"Acton",lat:43.631,lng:-80.032,region:"Halton Hills",km:88,band:"75-100km",rate:400},
  {name:"Ajax",lat:43.851,lng:-79.020,region:"Durham Region",km:25,band:"0-25km",rate:100},
  {name:"Alliston",lat:44.153,lng:-79.870,region:"Simcoe County",km:108,band:"100km+",rate:540},
  {name:"Alton",lat:43.863,lng:-80.070,region:"Peel/Dufferin",km:95,band:"75-100km",rate:400},
  {name:"Aurora",lat:43.995,lng:-79.450,region:"York Region",km:45,band:"25-50km",rate:150},

function getBandFromKm(km) {
  if (km <= 25) return "0-25km";
  if (km <= 50) return "25-50km";
  if (km <= 75) return "50-75km";
  if (km <= 100) return "75-100km";
  return "100km+";
}

function getBandFromRate(rate) {
  if (rate <= 100) return "0-25km";
  if (rate <= 150) return "25-50km";
  if (rate <= 250) return "50-75km";
  if (rate <= 400) return "75-100km";
  return "100km+";
}

newCities.forEach(city => {
  const band = getBandFromRate(city.rate);
  const c = bandColors[band];
  const marker = L.circleMarker([city.lat, city.lng], {
    radius: 7, fillColor: c.fill, color: c.stroke,
    weight: 2, fillOpacity: 0.85
  }).addTo(newLayerGroup);

  const oldMatch = oldCities.find(o => o.name === city.name);
  let compareHtml = '';
  if (oldMatch) {
    const delta = city.rate - oldMatch.rate;
    const cls = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-same';
    const sign = delta > 0 ? '+' : '';
    const src = oldMatch.listed ? 'listed' : '$8/km';
    compareHtml = '<div class="popup-compare">Old: <strong>$' + oldMatch.rate + '</strong> (' + src + ') &rarr; New: <strong>$' + city.rate + '</strong> <span class="' + cls + '">(' + sign + '$' + delta + ')</span></div>';
  }

  marker.bindPopup(
    '<div class="city-popup">' +
    '<div class="popup-title">' + city.name + '</div>' +
    '<div class="popup-band">' + city.region + ' &bull; ' + city.km + ' km &bull; ' + city.band + '</div>' +
    '<div class="popup-price" style="color:' + c.stroke + '">$' + city.rate + '</div>' +
    compareHtml + '</div>', {maxWidth:280}
  );

  let tooltipText = '$' + city.rate;
  let tooltipClass = 'price-label';
  if (oldMatch) {
    const delta = city.rate - oldMatch.rate;
    if (delta > 0) { tooltipText = '+$' + delta; tooltipClass = 'price-label delta-label-up'; }
    else if (delta < 0) { tooltipText = '-$' + Math.abs(delta); tooltipClass = 'price-label delta-label-down'; }
    else { tooltipText = '$0'; tooltipClass = 'price-label delta-label-same'; }
  }
  marker.bindTooltip(tooltipText, {
    permanent: true, direction: 'top', offset: [0, -10],
    className: tooltipClass
  });
});

// Build contract event detail HTML for a customer, filtered by current slider range and status filter
window.getContractEvents = function(cityKey, customerName) {
  const fromIdx = parseInt(document.getElementById('slider-from').value);
  const toIdx = parseInt(document.getElementById('slider-to').value);
  const startIdx = Math.min(fromIdx, toIdx);
  const endIdx = Math.max(fromIdx, toIdx);
  
  const startWk = weekKeys[startIdx];
  const endWk = weekKeys[endIdx];
  // Convert week keys to date range
  const wkToMonday = (wk) => {
    const [y, w] = wk.split('-W').map(Number);
    const jan1 = new Date(y, 0, 1);
    const dayOfWeek = jan1.getDay();
    const daysToMonday = (dayOfWeek <= 4 ? 1 - dayOfWeek : 8 - dayOfWeek);
    const week1Monday = new Date(jan1.getTime() + daysToMonday * 86400000);
    return new Date(week1Monday.getTime() + (w - 1) * 7 * 86400000);
  };
  const startDate = wkToMonday(startWk).toISOString().slice(0, 10);
  const endMonday = wkToMonday(endWk);
  const endDate = new Date(endMonday.getTime() + 6 * 86400000).toISOString().slice(0, 10);
  
  // Look up contract events — handle ZONE: keys by searching all CITY: keys that map to this zone
  let custEvents = null;
  const directData = contractEvents[cityKey];
  if (directData && directData[customerName]) {
    custEvents = directData[customerName];
  } else if (cityKey.startsWith('ZONE:')) {
    // Search all CITY: keys that map to this zone
    const zoneName = cityKey.slice(5);
    for (const [ck, zn] of Object.entries(cityKeyToZone)) {
      if (zn === zoneName) {
        const cd = contractEvents[ck];
        if (cd && cd[customerName]) { custEvents = cd[customerName]; break; }
      }
    }
    // Also check FSA keys (Toronto FSA keys in contractEvents)
    if (!custEvents) {
      for (const [locKey, locData] of Object.entries(contractEvents)) {
        if (!locKey.startsWith('CITY:') && locData[customerName]) {
          custEvents = locData[customerName]; break;
        }
      }
    }
  } else {
    // Try searching all contractEvents for this customer
    for (const locData of Object.values(contractEvents)) {
      if (locData[customerName]) { custEvents = locData[customerName]; break; }
    }
  }
  if (!custEvents || custEvents.length === 0) return '<div style="padding:8px;font-size:11px;color:#888;text-align:center;background:#f8f8f8;border-radius:4px;margin:4px 0;">No contract data available for this customer</div>';
  
  // Filter by date range, company, and status
  const filtered = custEvents.filter(e => {
    const inRange = e[0] >= startDate && e[0] <= endDate;
    if (!inRange) return false;
    // Company filter — "Other" always included as safety net
    const _info = contractInfo[e[1]];
    const _co = _info && _info.co ? _info.co : 'Other';
    if (_co !== 'Other' && !companyFilter.has(_co)) return false;
    if (contractFilter === 'closed') return e[5] === 'C';
    if (contractFilter === 'open') return e[5] === 'O';
    return true;
  });

  if (filtered.length === 0) return '<div style="padding:8px;font-size:11px;color:#888;text-align:center;background:#f8f8f8;border-radius:4px;margin:4px 0;">No contracts in the selected date range</div>';

  // Group by date
  const byDate = {};
  filtered.forEach(e => {
    if (!byDate[e[0]]) byDate[e[0]] = [];
    byDate[e[0]].push(e);
  });
  const sortedDates = Object.keys(byDate).sort();

  let h = '<table class="event-table"><tr><th>Date</th><th>Contracts</th><th>Rent</th><th>Del Fee</th><th>Type</th><th>Status</th></tr>';
  sortedDates.forEach(date => {
    const rows = byDate[date];
    const totalRent = rows.reduce((s,e) => s + e[2], 0);
    const totalFee = rows.reduce((s,e) => s + e[3], 0);
    const contracts = rows.map(e => e[1]);
    const hasDelivery = rows.some(e => e[4] === 'D');
    const hasCustPU = rows.some(e => e[4] === 'CP');
    const typeLabel = hasDelivery && hasCustPU ? '<span style="color:#2171b5;">D</span>/<span style="color:#888;">CP</span>'
      : hasDelivery ? '<span style="color:#2171b5;">Delivery</span>'
      : '<span style="color:#888;">Cust Pickup</span>';
    const hasClosed = rows.some(e => e[5] === 'C');
    const hasOpen = rows.some(e => e[5] === 'O');
    const statusLabel = hasClosed && hasOpen ? '<span style="color:#2c3e50;">C</span>/<span style="color:#e67e22;">O</span>'
      : hasClosed ? '<span style="color:#2c3e50;">Closed</span>'
      : '<span style="color:#e67e22;">Open</span>';
    const feeStr = totalFee > 0 ? '$' + Math.round(totalFee).toLocaleString() : '\u2014';
    // Make each contract number clickable for detail drill-down
    const detailPrefix = 'cinfo_' + Math.random().toString(36).slice(2,6) + '_';
    const contractLinks = contracts.map((c, idx) => {
      const did = detailPrefix + c;
      return '<span class="contract-num-link" onclick="event.stopPropagation();showContractDetail(\'' + c + '\',\'' + did + '\')">' + c + '</span>';
    });
    const contractCell = rows.length === 1 ? contractLinks[0] : '<span style="font-size:9px;">' + contractLinks.join(', ') + '</span>';
    h += '<tr><td>' + date + '</td><td>' + contractCell + '</td><td>$' + Math.round(totalRent).toLocaleString() + '</td><td>' + feeStr + '</td><td>' + typeLabel + '</td><td>' + statusLabel + '</td></tr>';
    // Add detail card placeholders for each contract
    contracts.forEach(c => {
      const did = detailPrefix + c;
      h += '<tr><td colspan="6" style="padding:0;"><div class="cd-inline" id="' + did + '"></div></td></tr>';
    });
  });
  h += '</table>';
  return h;
};

function updateTimeline() {
  const fromIdx = parseInt(document.getElementById('slider-from').value);
  const toIdx = parseInt(document.getElementById('slider-to').value);
  const startIdx = Math.min(fromIdx, toIdx);
  const endIdx = Math.max(fromIdx, toIdx);
  document.getElementById('slider-from').value = startIdx;
  document.getElementById('slider-to').value = endIdx;

  const startLabel = weekLabels[weekKeys[startIdx]] || '';
  const endLabel = weekLabels[weekKeys[endIdx]] || '';
  const startShort = startLabel.split(' \u2013 ')[0];
  const endShort = endLabel.split(' \u2013 ')[1] || endLabel.split(' \u2013 ')[0];

  // Determine years for display
  const startWkKey = weekKeys[startIdx];
  const endWkKey = weekKeys[endIdx];
  const startYear = startWkKey.split('-')[0];
  const endYear = endWkKey.split('-')[0];
  const yearSuffix = startYear === endYear ? ' ' + startYear : ' ' + startYear + '–' + endYear;
  
  if (startIdx === 0 && endIdx === weekKeys.length - 1) {
    document.getElementById('range-display').textContent = 'All Weeks (2025–2026)';
  } else {
    document.getElementById('range-display').textContent = startShort + ' \u2013 ' + endShort + yearSuffix + ' (' + (endIdx - startIdx + 1) + ' weeks)';
  }

  // ===== ACCUMULATE FROM UNIFIED contractWeekly =====
  const contractCityData = {};
  let hasData = false;

  for (let i = startIdx; i <= endIdx; i++) {
    const wk = weekKeys[i];
    const cdata = contractWeekly[wk];
    if (!cdata) continue;
    hasData = true;
    for (const [locKey, statuses] of Object.entries(cdata)) {
      if (!contractCityData[locKey]) contractCityData[locKey] = {closed:{r:0,f:0,d:0,p:0,e:0,v:{}}, open:{r:0,f:0,d:0,p:0,e:0,v:{}}};
      for (const status of ['closed','open']) {
        const raw = statuses[status];
        if (!raw) continue;
        const cd = contractCityData[locKey][status];
        // Dual-schema support:
        //   OLD shape: raw = { r, f, d, p, e, v }  (no company filter possible)
        //   NEW shape: raw = { "GTA Rentals": {r,f,d,p,e,v}, "West": {...}, ... }
        // Detect by checking whether raw.r is a number (old shape).
        const isOldShape = (typeof raw.r === 'number');
        const addOne = (sd) => {
          cd.r += sd.r; cd.f += sd.f; cd.d += sd.d; cd.p += sd.p; cd.e += sd.e;
          if (sd.v) sd.v.forEach(v => {
            if (!cd.v[v[0]]) cd.v[v[0]] = [0,0,0];
            cd.v[v[0]][0] += v[1]; cd.v[v[0]][1] += v[2]; cd.v[v[0]][2] += v[3];
          });
        };
        if (isOldShape) {
          // Old JSON — company filter is a no-op, treat as "all"
          addOne(raw);
        } else {
          // New JSON — iterate companies, filter in. "Other" always included.
          for (const co in raw) {
            if (co !== 'Other' && !companyFilter.has(co)) continue;
            addOne(raw[co]);
          }
        }
      }
    }
  }

  // Contract filter + future indicator
  const filterEl = document.getElementById('contract-filter');
  const futureEl = document.getElementById('future-indicator');
  filterEl.className = 'contract-filter visible';
  futureEl.className = hasData ? 'future-indicator visible' : 'future-indicator';
  if (hasData) futureEl.textContent = Object.keys(contractCityData).length + ' locations in range';

  // Rebuild layers
  // Fix memory leak: unbind popups and tooltips before clearing layers
  revLayerGroup.eachLayer(function(layer) {
    if (layer.unbindPopup) layer.unbindPopup();
    if (layer.unbindTooltip) layer.unbindTooltip();
    if (layer.off) layer.off();
  });
  revLayerGroup.clearLayers();

  // ===== UNIFIED BUBBLE RENDERING =====
  const allLocations = {};

  function ensureLoc(key, name, lat, lng) {
    if (!allLocations[key]) allLocations[key] = {
      rev:0, events:0, del:0, pick:0, fees:0, venues:{},
      lat:lat, lng:lng, name:name,
      closedR:0, openR:0, closedE:0, openE:0
    };
    return allLocations[key];
  }

  // Build allLocations from contractCityData (skip in pickup mode — handled separately)
  if (contractFilter !== 'pickup') {
    for (const [locKey, cityData] of Object.entries(contractCityData)) {
      const ref = contractCityRef[locKey];

      // Determine display location
      let displayKey, displayName, displayLat, displayLng;
      if (locKey.startsWith('CITY:')) {
        const zone = cityKeyToZone[locKey];
        if (zone && !zone.startsWith('CITY:')) {
          const zc = zoneCoords[zone];
          if (!zc) continue;
          displayKey = 'ZONE:' + zone;
          displayName = zone;
          displayLat = zc.lat; displayLng = zc.lng;
        } else if (ref) {
          displayKey = locKey;
          displayName = ref.name;
          displayLat = ref.lat; displayLng = ref.lng;
        } else continue;
      } else if (locKey.split(',')[0].startsWith('M')) {
        // Toronto FSA — individual
        if (!ref) continue;
        displayKey = locKey;
        displayName = ref.name;
        displayLat = ref.lat; displayLng = ref.lng;
      } else {
        // Non-Toronto FSA — merge by zone
        const firstFsa = locKey.split(',')[0].trim();
        const zone = fsaToZone[firstFsa];
        if (zone) {
          const zc = zoneCoords[zone];
          if (!zc) continue;
          displayKey = 'ZONE:' + zone;
          displayName = zone;
          displayLat = zc.lat; displayLng = zc.lng;
        } else if (ref) {
          displayKey = locKey;
          displayName = ref.name;
          displayLat = ref.lat; displayLng = ref.lng;
        } else continue;
      }

      const loc = ensureLoc(displayKey, displayName, displayLat, displayLng);

      // Accumulate based on filter
      if (contractFilter === 'all' || contractFilter === 'closed') {
        const c = cityData.closed;
        loc.rev += c.r; loc.fees += c.f; loc.del += c.d; loc.pick += c.p; loc.events += c.e;
        loc.closedR += c.r; loc.closedE += c.e;
        if (c.v) for (const [vn, vd] of Object.entries(c.v)) {
          if (!loc.venues[vn]) loc.venues[vn] = {rev:0, events:0, fees:0};
          loc.venues[vn].rev += vd[0]; loc.venues[vn].fees += vd[1]; loc.venues[vn].events += vd[2];
        }
      }
      if (contractFilter === 'all' || contractFilter === 'open') {
        const o = cityData.open;
        loc.rev += o.r; loc.fees += o.f; loc.del += o.d; loc.pick += o.p; loc.events += o.e;
        loc.openR += o.r; loc.openE += o.e;
        if (o.v) for (const [vn, vd] of Object.entries(o.v)) {
          if (!loc.venues[vn]) loc.venues[vn] = {rev:0, events:0, fees:0};
          loc.venues[vn].rev += vd[0]; loc.venues[vn].fees += vd[1]; loc.venues[vn].events += vd[2];
        }
      }
    }
  }

  // --- Render all locations as ONE bubble each ---
  for (const [locKey, loc] of Object.entries(allLocations)) {
    if (loc.rev <= 0) continue;

    const rev = loc.rev;
    const maxRev = 200000;
    const minR = 5, maxR = 30;
    const radius = Math.min(maxR, minR + (rev / maxRev) * (maxR - minR));

    const marker = L.circleMarker([loc.lat, loc.lng], {
      radius: radius,
      fillColor: revColor(rev), color: revStroke(rev),
      weight: 1.5, fillOpacity: 0.75, opacity: 0.9
    }).addTo(revLayerGroup);

    // Venue table
    const venueArr = Object.entries(loc.venues).sort((a,b) => b[1].rev - a[1].rev);
    let venueHtml = '';
    let vidx = 0;
    const popupId = 'loc_' + locKey.replace(/[^a-zA-Z0-9]/g,'').slice(0,10) + '_' + Math.random().toString(36).slice(2,6);
    venueArr.slice(0, 15).forEach(([name, vd]) => {
      const avgFee = vd.events > 0 && vd.fees > 0 ? '$' + Math.round(vd.fees / vd.events).toLocaleString() : '\u2014';
      const detailId = popupId + '_' + vidx;
      const escapedName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const escapedLocKey = locKey.replace(/'/g, "\\'");

      venueHtml += '<tr class="venue-row" onclick="var el=document.getElementById(\'' + detailId + '\');if(!el.innerHTML){el.innerHTML=\'<td colspan=4>\'+getContractEvents(\'' + escapedLocKey + '\',\'' + escapedName + '\')+\'</td>\';}toggleVenueDetail(\'' + detailId + '\')">' +
        '<td style="padding:2px 6px;font-size:11px;color:#1a73e8;text-decoration:underline;">' + name + '<span class="venue-expand">\u25BC</span></td>' +
        '<td style="padding:2px 6px;font-size:11px;text-align:right;font-weight:600;">$' + Math.round(vd.rev).toLocaleString() + '</td>' +
        '<td style="padding:2px 6px;font-size:11px;text-align:center;">' + vd.events + '</td>' +
        '<td style="padding:2px 6px;font-size:11px;text-align:right;color:#8B4513;font-weight:600;">' + avgFee + '</td></tr>';
      venueHtml += '<tr class="venue-detail" id="' + detailId + '"></tr>';
      vidx++;
    });
    if (venueArr.length > 15) venueHtml += '<tr><td colspan="4" style="padding:2px 6px;font-size:10px;color:#999;">+' + (venueArr.length - 15) + ' more</td></tr>';

    // Summary
    const avgFee = loc.del > 0 ? '$' + Math.round(loc.fees / loc.del) : 'N/A';
    let pr = null;
    if (locKey.startsWith('ZONE:')) {
      pr = typeof cityPricing !== 'undefined' ? cityPricing[locKey.slice(5).toUpperCase()] : null;
    } else if (locKey.startsWith('CITY:')) {
      pr = typeof cityPricing !== 'undefined' ? cityPricing[locKey.slice(5)] : null;
    } else {
      const prKey = locKey.split(',')[0];
      pr = fsaPricing[prKey];
    }
    const pricingHtml = pr ? '<div style="display:flex;gap:10px;margin:4px 0;padding:5px 8px;background:#f8f8f8;border-radius:4px;font-size:11px;">' +
      '<span><strong>Old:</strong> $' + pr.o.toLocaleString() + '</span>' +
      '<span><strong>New:</strong> $' + pr.n.toLocaleString() + '</span>' +
      (pr.n !== pr.o ? '<span style="color:' + (pr.n > pr.o ? '#c0392b' : '#27ae60') + ';font-weight:700;">' + (pr.n > pr.o ? '+' : '') + '$' + (pr.n - pr.o).toLocaleString() + '</span>' : '<span style="color:#888;">No change</span>') +
      '<span style="color:#888;">' + pr.k + 'km / ' + pr.b + '</span></div>' : '';

    const summaryHtml = '<div style="display:flex;gap:12px;margin:4px 0;font-size:11px;">' +
      '<span style="color:#2171b5;font-weight:600;">' + loc.del + ' Deliveries</span>' +
      '<span style="color:#c87f0a;font-weight:600;">' + loc.pick + ' Pickups</span></div>' +
      '<div class="popup-band" style="color:#8B4513;font-weight:600;">Avg Delivery Fee: ' + avgFee + '</div>' +
      pricingHtml;

    let splitHtml = '';
    if (loc.closedR > 0 || loc.openR > 0) {
      splitHtml = '<div style="display:flex;gap:8px;margin:2px 0;font-size:11px;">';
      if (loc.closedR > 0) splitHtml += '<span style="color:#2c3e50;font-weight:600;">Closed: $' + Math.round(loc.closedR).toLocaleString() + '</span>';
      if (loc.openR > 0) splitHtml += '<span style="color:#e67e22;font-weight:600;">Open: $' + Math.round(loc.openR).toLocaleString() + '</span>';
      splitHtml += '</div>';
    }

    marker.bindPopup(
      '<div class="city-popup">' +
      '<div class="popup-title">' + loc.name + '</div>' +
      '<div class="popup-price" style="color:' + revStroke(rev) + '">$' + Math.round(rev).toLocaleString() + '</div>' +
      '<div class="popup-band">' + loc.events + ' events</div>' +
      summaryHtml +
      splitHtml +
      (venueHtml ? '<table style="width:100%;border-collapse:collapse;margin-top:6px;"><tr style="border-bottom:1px solid #eee;"><th style="padding:2px 6px;font-size:10px;text-align:left;">Venue</th><th style="padding:2px 6px;font-size:10px;text-align:right;">Revenue</th><th style="padding:2px 6px;font-size:10px;">Events</th><th style="padding:2px 6px;font-size:10px;text-align:right;color:#8B4513;">Avg Fee</th></tr>' + venueHtml + '</table>' : '') +
      '</div>', {maxWidth: 480}
    );
  }

  // Total from unified allLocations
  let totalRev = 0;
  let totalEvents = 0;
  for (const loc of Object.values(allLocations)) {
    totalRev += loc.rev;
    totalEvents += loc.events;
  }
  if (totalRev === 0 && totalEvents === 0) {
    document.getElementById('rev-total').textContent = 'No data available for this period';
    document.getElementById('rev-total').style.color = '#999';
  } else {
    const totalLabel = 'Total: $' + Math.round(totalRev).toLocaleString() + ' (' + totalEvents + ' events, ' + Object.keys(allLocations).length + ' locations)';
    document.getElementById('rev-total').textContent = totalLabel;
    document.getElementById('rev-total').style.color = '';
  }

  // Update pickup layer
  if (pickupVisible) buildPickupLayer();
}


// Extract revColor and revStroke as named functions for reuse
function revColor(rev) {
  if (rev <= 10000) return '#fee08b';
  if (rev <= 25000) return '#fdae61';
  if (rev <= 50000) return '#f46d43';
  if (rev <= 75000) return '#d73027';
  return '#a50026';
}
function revStroke(rev) {
  if (rev <= 10000) return '#d4a017';
  if (rev <= 25000) return '#c87f0a';
  if (rev <= 50000) return '#c0392b';
  if (rev <= 75000) return '#a01a1a';
  return '#6e001a';
}

fetch('delivery_data.json?v=' + Date.now(), { cache: 'no-store' })
  .then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(function(data){
    data.weekKeys.forEach(function(k){ weekKeys.push(k); });

    Object.assign(contractWeekly, data.contractWeekly);
    Object.assign(contractCityRef, data.contractCityRef);
    Object.assign(contractEvents, data.contractEvents);

// Quick-jump to preset date ranges
window.quickJump = function(preset) {
  // Helper: find the weekKeys index for a given ISO week string
  const findIdx = (wk) => { const i = weekKeys.indexOf(wk); return i >= 0 ? i : -1; };
  // Helper: ISO week string from a Date
  const dateToWk = (d) => {
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const days = Math.floor((d - jan1) / 86400000);
    const wk = Math.ceil((days + jan1.getDay() + 1) / 7);
    // Use proper ISO calc
    const iso = new Date(d.getTime());
    iso.setDate(iso.getDate() + 3 - ((iso.getDay() + 6) % 7));
    const yearStart = new Date(iso.getFullYear(), 0, 4);
    const weekNum = 1 + Math.round(((iso - yearStart) / 86400000 - 3 + ((yearStart.getDay() + 6) % 7)) / 7);
    return iso.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
  };

  let fromIdx = 0, toIdx = weekKeys.length - 1;
  const today = new Date();

  if (preset === 'all') {
    fromIdx = 0; toIdx = weekKeys.length - 1;
  } else if (preset === '2025') {
    fromIdx = findIdx('2025-W01');
    // Find last 2025 week
    for (let i = weekKeys.length - 1; i >= 0; i--) { if (weekKeys[i].startsWith('2025')) { toIdx = i; break; } }
  } else if (preset === '2026') {
    // Find first 2026 week
    for (let i = 0; i < weekKeys.length; i++) { if (weekKeys[i].startsWith('2026')) { fromIdx = i; break; } }
    toIdx = weekKeys.length - 1;
  } else if (preset === 'q1') {
    const s = findIdx('2026-W01'); if (s >= 0) fromIdx = s;
    const e = findIdx('2026-W13'); if (e >= 0) toIdx = e;
  } else if (preset === 'q2') {
    const s = findIdx('2026-W14'); if (s >= 0) fromIdx = s;
    const e = findIdx('2026-W26'); if (e >= 0) toIdx = e; else toIdx = weekKeys.length - 1;
  } else if (preset === 'month') {
    // Current month: find all weeks that overlap this month
    const y = today.getFullYear(), m = today.getMonth();
    const firstDay = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0);
    const startWk = dateToWk(firstDay);
    const endWk = dateToWk(lastDay);
    const s = findIdx(startWk); if (s >= 0) fromIdx = s;
    const e = findIdx(endWk); if (e >= 0) toIdx = e; else toIdx = weekKeys.length - 1;
  } else if (preset === 'week') {
    const wk = dateToWk(today);
    const i = findIdx(wk);
    if (i >= 0) { fromIdx = i; toIdx = i; }
  }

  document.getElementById('slider-from').value = fromIdx;
  document.getElementById('slider-to').value = toIdx;
  updateTimeline();

  // Highlight the active button
  document.querySelectorAll('.qj-btn').forEach(b => b.classList.remove('qj-active'));
  event.target.classList.add('qj-active');
};


// ===== CUSTOMER PICKUP LAYER =====
// pickupLayerGroup and pickupVisible declared above with other state vars

function buildPickupLayer() {
  // Fix memory leak: unbind popups and tooltips before clearing layers
  pickupLayerGroup.eachLayer(function(layer) {
    if (layer.unbindPopup) layer.unbindPopup();
    if (layer.unbindTooltip) layer.unbindTooltip();
    if (layer.off) layer.off();
  });
  pickupLayerGroup.clearLayers();
  const fromIdx = parseInt(document.getElementById('slider-from').value);
  const toIdx = parseInt(document.getElementById('slider-to').value);
  const startIdx = Math.min(fromIdx, toIdx);
  const endIdx = Math.max(fromIdx, toIdx);

  // Aggregate customer pickups by location with per-customer venue breakdown
  // We need to go through contractEvents (detail level) to identify which contracts are pickups
  // A contract is a customer pickup if type = "CP"
  const pickupData = {}; // {locKey: {events, rent, fees, closed:{r,e}, open:{r,e}, venues:{name:[rent,fees,count]}}}

  for (const [locKey, customers] of Object.entries(contractEvents)) {
    for (const [custName, rows] of Object.entries(customers)) {
      for (const row of rows) {
        // row = [date, contract#, rent, delFee, type(D/CP), status(C/O)]
        if (row[4] !== 'CP') continue; // Only customer pickups

        // Company filter — look up via contractInfo. "Other" (unclassified)
        // is always included as a safety net.
        const _info = contractInfo[row[1]];
        const _co = _info && _info.co ? _info.co : 'Other';
        if (_co !== 'Other' && !companyFilter.has(_co)) continue;

        // Check date is in slider range
        const wk = (function(dateStr) {
          const d = new Date(dateStr + 'T00:00:00');
          const iso = new Date(d.getTime());
          iso.setDate(iso.getDate() + 3 - ((iso.getDay() + 6) % 7));
          const ys = new Date(iso.getFullYear(), 0, 4);
          const wn = 1 + Math.round(((iso - ys) / 86400000 - 3 + ((ys.getDay() + 6) % 7)) / 7);
          return iso.getFullYear() + '-W' + String(wn).padStart(2, '0');
        })(row[0]);
        const wkIdx = weekKeys.indexOf(wk);
        if (wkIdx < startIdx || wkIdx > endIdx) continue;

        // Status filter (pickup mode shows all, but respect closed/open if set before switching)
        const isOpen = row[5] === 'O';

        if (!pickupData[locKey]) pickupData[locKey] = {events:0, rent:0, fees:0, closed:{r:0,e:0}, open:{r:0,e:0}, venues:{}};
        const pd = pickupData[locKey];
        pd.events += 1;
        pd.rent += row[2];
        pd.fees += row[3];
        if (isOpen) { pd.open.r += row[2]; pd.open.e += 1; }
        else { pd.closed.r += row[2]; pd.closed.e += 1; }

        if (!pd.venues[custName]) pd.venues[custName] = [0, 0, 0];
        pd.venues[custName][0] += row[2];
        pd.venues[custName][1] += row[3];
        pd.venues[custName][2] += 1;
      }
    }
  }

  // Build markers — same style as revenue heatmap contract bubbles
  for (const [locKey, pd] of Object.entries(pickupData)) {
    const ref = contractCityRef[locKey];
    if (!ref || pd.events === 0) continue;

    const rev = pd.rent;
    const maxRev = 100000;
    const minR = 5, maxR = 30;
    const radius = Math.min(maxR, minR + (rev / maxRev) * (maxR - minR));

    const marker = L.circleMarker([ref.lat, ref.lng], {
      radius: radius,
      fillColor: revColor(rev), color: revStroke(rev),
      weight: 1.5, fillOpacity: 0.75, opacity: 0.9
    }).addTo(pickupLayerGroup);

    // Build customer venue table with drill-down (same as contract bubbles)
    const venueArr = Object.entries(pd.venues).sort((a,b) => b[1][0] - a[1][0]).slice(0, 15);
    let venueHtml = '';
    let cvIdx = 0;
    const cpopupId = 'cpup_' + locKey.replace(/,/g,'') + '_' + Math.random().toString(36).slice(2,6);
    venueArr.forEach(([name, vd]) => {
      const avgFeeV = vd[2] > 0 && vd[1] > 0 ? '$' + Math.round(vd[1] / vd[2]).toLocaleString() : '\u2014';
      const cdetailId = cpopupId + '_' + cvIdx;
      const escapedName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const escapedLoc = locKey.replace(/'/g, "\\'");
      venueHtml += '<tr class="venue-row" onclick="var el=document.getElementById(\'' + cdetailId + '\');if(!el.innerHTML){el.innerHTML=\'<td colspan=4>\'+getContractEvents(\'' + escapedLoc + '\',\'' + escapedName + '\')+\'</td>\';}toggleVenueDetail(\'' + cdetailId + '\')">' +
        '<td style="padding:2px 6px;font-size:11px;color:#1a73e8;text-decoration:underline;">' + name + '<span class="venue-expand">\u25BC</span></td>' +
        '<td style="padding:2px 6px;font-size:11px;text-align:right;font-weight:600;">$' + Math.round(vd[0]).toLocaleString() + '</td>' +
        '<td style="padding:2px 6px;font-size:11px;text-align:center;">' + vd[2] + '</td>' +
        '<td style="padding:2px 6px;font-size:11px;text-align:right;color:#8B4513;font-weight:600;">' + avgFeeV + '</td></tr>';
      venueHtml += '<tr class="venue-detail" id="' + cdetailId + '"></tr>';
      cvIdx++;
    });

    // Old/New pricing box
    const cPr = locKey.startsWith('CITY:')
      ? (typeof cityPricing !== 'undefined' ? cityPricing[locKey.slice(5)] : null)
      : fsaPricing[locKey.indexOf(',') > -1 ? locKey.split(',')[0] : locKey];
    const cPricingHtml = cPr ? '<div style="display:flex;gap:10px;margin:4px 0;padding:5px 8px;background:#f8f8f8;border-radius:4px;font-size:11px;">' +
      '<span><strong>Old:</strong> $' + cPr.o.toLocaleString() + '</span>' +
      '<span><strong>New:</strong> $' + cPr.n.toLocaleString() + '</span>' +
      (cPr.n !== cPr.o ? '<span style="color:' + (cPr.n > cPr.o ? '#c0392b' : '#27ae60') + ';font-weight:700;">' + (cPr.n > cPr.o ? '+' : '') + '$' + (cPr.n - cPr.o).toLocaleString() + '</span>' : '<span style="color:#888;">No change</span>') +
      '<span style="color:#888;">' + cPr.k + 'km / ' + cPr.b + '</span></div>' : '';

    // Status split
    let splitHtml = '';
    if (pd.closed.r > 0 || pd.open.r > 0) {
      splitHtml = '<div style="display:flex;gap:8px;margin:2px 0;font-size:11px;">';
      if (pd.closed.r > 0) splitHtml += '<span style="color:#2c3e50;font-weight:600;">Closed: $' + Math.round(pd.closed.r).toLocaleString() + ' (' + pd.closed.e + ')</span>';
      if (pd.open.r > 0) splitHtml += '<span style="color:#e67e22;font-weight:600;">Open: $' + Math.round(pd.open.r).toLocaleString() + ' (' + pd.open.e + ')</span>';
      splitHtml += '</div>';
    }

    marker.bindPopup(
      '<div class="city-popup">' +
      '<div class="popup-title">' + ref.name + '</div>' +
      '<div class="popup-band" style="color:#475569;font-weight:700;">Customer Pickups Only</div>' +
      '<div class="popup-price" style="color:' + revStroke(rev) + '">$' + Math.round(rev).toLocaleString() + '</div>' +
      '<div class="popup-band">' + pd.events + ' contracts (no delivery)</div>' +
      cPricingHtml +
      splitHtml +
      (venueHtml ? '<table style="width:100%;border-collapse:collapse;margin-top:6px;"><tr style="border-bottom:1px solid #eee;"><th style="padding:2px 6px;font-size:10px;text-align:left;">Customer</th><th style="padding:2px 6px;font-size:10px;text-align:right;">Rent</th><th style="padding:2px 6px;font-size:10px;">Contracts</th><th style="padding:2px 6px;font-size:10px;text-align:right;color:#8B4513;">Avg Fee</th></tr>' + venueHtml + '</table>' : '') +
      '</div>', {maxWidth: 480}
    );
  }
}



// Show contract detail card when clicking a contract number
// Unified drill-down: tries 2025 venue events first, then 2026 contract events
window.getUnifiedEvents = function(fsaKey, contractKey, venueName) {
  // Try 2025 data first (if we have FSA keys)
  if (fsaKey) {
    const result2025 = getVenueEvents(fsaKey, venueName);
    if (result2025 && !result2025.includes('No events')) return result2025;
  }
  // Try 2026 contract data
  if (contractKey) {
    const result2026 = getContractEvents(contractKey, venueName);
    if (result2026 && !result2026.includes('No contracts') && !result2026.includes('No data')) return result2026;
  }
  // Try both keys swapped (venue might be in contract data under a different loc key)
  if (fsaKey) {
    const result2026b = getContractEvents(fsaKey, venueName);
    if (result2026b && !result2026b.includes('No contracts') && !result2026b.includes('No data')) return result2026b;
  }
  return '<div style="padding:8px;font-size:11px;color:#888;text-align:center;background:#f8f8f8;border-radius:4px;margin:4px 0;">No event data available for this period</div>';
};

window.showContractDetail = function(contractNum, detailId) {
  const el = document.getElementById(detailId);
  if (!el) return;
  if (el.classList.contains('cd-open')) {
    el.classList.remove('cd-open');
    return;
  }
  const info = contractInfo[contractNum];
  if (!info) {
    el.innerHTML = '<div class="contract-detail-card"><em>No detail available for #' + contractNum + '</em></div>';
    el.classList.add('cd-open');
    return;
  }
  let h = '<div class="contract-detail-card">';
  h += '<div class="cd-header">Contract #' + contractNum + '</div>';
  if (info.cn) h += '<div class="cd-row"><span class="cd-label">Customer</span><span class="cd-value">' + info.cn + '</span></div>';
  if (info.vn) h += '<div class="cd-row"><span class="cd-label">Venue</span><span class="cd-value">' + info.vn + '</span></div>';
  if (info.ct) h += '<div class="cd-row"><span class="cd-label">Type</span><span class="cd-value">' + info.ct + '</span></div>';
  if (info.sp) h += '<div class="cd-row"><span class="cd-label">Salesperson</span><span class="cd-value">' + info.sp + '</span></div>';
  if (info.ca) h += '<div class="cd-row"><span class="cd-label">Caterer</span><span class="cd-value">' + info.ca + '</span></div>';
  if (info.pl) h += '<div class="cd-row"><span class="cd-label">Planner</span><span class="cd-value">' + info.pl + '</span></div>';
  if (info.tt) h += '<div class="cd-row"><span class="cd-label">Total Value</span><span class="cd-value">$' + info.tt.toLocaleString() + '</span></div>';
  if (info.sl) h += '<div class="cd-row"><span class="cd-label">Sale Items</span><span class="cd-value">$' + info.sl.toLocaleString() + '</span></div>';
  if (info.dn) h += '<div class="cd-notes">' + info.dn + '</div>';
  h += '</div>';
  el.innerHTML = h;
  el.classList.add('cd-open');
};

window.setContractFilter = function(mode) {
  contractFilter = mode;
  document.getElementById('cf-all').className = mode === 'all' ? 'cf-btn cf-all' : 'cf-btn';
  document.getElementById('cf-closed').className = mode === 'closed' ? 'cf-btn cf-closed' : 'cf-btn';
  document.getElementById('cf-open').className = mode === 'open' ? 'cf-btn cf-open' : 'cf-btn';
  document.getElementById('cf-pickup').className = mode === 'pickup' ? 'cf-btn cf-all' : 'cf-btn';
  // Pickup mode: hide revenue bubbles, show pickup layer
  if (mode === 'pickup') {
    if (!pickupVisible) {
      buildPickupLayer();
      map.addLayer(pickupLayerGroup);
      pickupVisible = true;
    } else {
      buildPickupLayer(); // Rebuild for current range
    }
  } else {
    if (pickupVisible) {
      map.removeLayer(pickupLayerGroup);
      pickupVisible = false;
    }
  }
  updateTimeline();
  updateLegend();
};

// Toggle a company bucket on/off (or "__ALL__" for select-all) and re-render.
// Behavior:
//   - Click an individual chip: flips that bucket in/out of the filter.
//   - Click "All" when any chip is off: turns all 4 back on.
//   - Click "All" when all 4 are already on: turns all 4 off (quick clear).
// Chip id pattern: "co-<lowercase-hyphenated-bucket>" (e.g. "co-gta-rentals",
// "co-all"). Internal bucket keys match process_cmmc.py: "GTA Rentals",
// "GTA Tents", "East", "West".
const CO_CHIP_IDS = {
  'GTA Rentals': 'co-gta-rentals',
  'GTA Tents':   'co-gta-tents',
  'East':        'co-east',
  'West':        'co-west',
};

function _setChipActive(id, active) {
  const el = document.getElementById(id);
  if (!el) return;
  if (active) el.classList.add('active');
  else el.classList.remove('active');
}

function _syncAllChip() {
  // "All" chip is visually active iff every bucket is in the filter.
  const allOn = ALL_COMPANIES.every(c => companyFilter.has(c));
  _setChipActive('co-all', allOn);
}

window.toggleCompany = function(co) {
  if (co === '__ALL__') {
    const allOn = ALL_COMPANIES.every(c => companyFilter.has(c));
    if (allOn) {
      // All currently on → clear everything
      ALL_COMPANIES.forEach(c => companyFilter.delete(c));
      ALL_COMPANIES.forEach(c => _setChipActive(CO_CHIP_IDS[c], false));
    } else {
      // Some off → turn all on
      ALL_COMPANIES.forEach(c => companyFilter.add(c));
      ALL_COMPANIES.forEach(c => _setChipActive(CO_CHIP_IDS[c], true));
    }
  } else {
    if (companyFilter.has(co)) companyFilter.delete(co);
    else companyFilter.add(co);
    _setChipActive(CO_CHIP_IDS[co], companyFilter.has(co));
  }
  _syncAllChip();
  updateTimeline();
};

window.toggleLayer = function(which) {
  if (which === 'new') {
    newVisible = !newVisible;
    if (newVisible) { map.addLayer(newLayerGroup); document.getElementById('btn-new').className='toggle-btn active-new'; document.getElementById('btn-new').innerHTML='&#10004; New Pricing (99)'; }
    else { map.removeLayer(newLayerGroup); document.getElementById('btn-new').className='toggle-btn'; document.getElementById('btn-new').textContent='New Pricing (99)'; }
  } else if (which === 'old') {
    oldVisible = !oldVisible;
    if (oldVisible) { map.addLayer(oldLayerGroup); document.getElementById('btn-old').className='toggle-btn active-old'; document.getElementById('btn-old').innerHTML='&#10004; Old Pricing (101)'; }
    else { map.removeLayer(oldLayerGroup); document.getElementById('btn-old').className='toggle-btn'; document.getElementById('btn-old').textContent='Old Pricing (101)'; }
  } else if (which === 'rev') {
    revVisible = !revVisible;
    if (revVisible) { map.addLayer(revLayerGroup); document.getElementById('timeline-panel').style.display='block'; document.getElementById('btn-rev').className='toggle-btn active-rev'; document.getElementById('btn-rev').innerHTML='&#10004; Revenue Heatmap'; }
    else { map.removeLayer(revLayerGroup); document.getElementById('timeline-panel').style.display='none'; document.getElementById('btn-rev').className='toggle-btn'; document.getElementById('btn-rev').textContent='Revenue Heatmap'; }
  }
  updateLegend();
};

// ===== GPS LOCATE ME BUTTON =====
(function() {
  var LocateControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function(map) {
      var container = L.DomUtil.create('div', 'leaflet-control-locate leaflet-bar');
      var link = L.DomUtil.create('a', '', container);
      link.href = '#';
      link.title = 'Show my location';
      link.setAttribute('role', 'button');
      link.setAttribute('aria-label', 'Show my location');
      link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';

      var locateMarker = null;
      var locateCircle = null;

      L.DomEvent.disableClickPropagation(container);
      L.DomEvent.on(link, 'click', function(e) {
        L.DomEvent.preventDefault(e);
        container.classList.add('locating');
        link.title = 'Locating...';

        map.locate({ setView: true, maxZoom: 13, enableHighAccuracy: true });
      });

      map.on('locationfound', function(e) {
        container.classList.remove('locating');
        link.title = 'Show my location';

        if (locateMarker) map.removeLayer(locateMarker);
        if (locateCircle) map.removeLayer(locateCircle);

        locateCircle = L.circle(e.latlng, {
          radius: e.accuracy / 2,
          fillColor: '#4285f4', fillOpacity: 0.15,
          color: '#4285f4', weight: 1, opacity: 0.4
        }).addTo(map);

        locateMarker = L.circleMarker(e.latlng, {
          radius: 8, fillColor: '#4285f4', color: '#fff',
          weight: 3, fillOpacity: 1
        }).addTo(map).bindPopup('You are here (±' + Math.round(e.accuracy) + 'm)');
      });

      map.on('locationerror', function(e) {
        container.classList.remove('locating');
        link.title = 'Show my location';
        alert('Could not determine your location. Please ensure location services are enabled.');
      });

      return container;
    }
  });
  new LocateControl().addTo(map);
})();

// ===== MOBILE ENHANCEMENTS =====
(function() {
  var isMobile = window.innerWidth <= 768;
  if (!isMobile) return;

  // 1. Make legend collapsible on mobile
  if (legendDiv) {
    // Wrap existing content
    var existingHTML = legendDiv.innerHTML;
    legendDiv.innerHTML = '<button class="legend-toggle">Legend</button><div class="legend-content">' + existingHTML + '</div>';
    legendDiv.classList.add('legend-collapsed'); // Start collapsed on mobile

    legendDiv.querySelector('.legend-toggle').addEventListener('click', function(e) {
      e.stopPropagation();
      legendDiv.classList.toggle('legend-collapsed');
    });

    // Patch updateLegend to preserve collapsible wrapper
    var origUpdateLegend = window.updateLegend || updateLegend;
    updateLegend = function() {
      if (!legendDiv) return;
      var contentDiv = legendDiv.querySelector('.legend-content');
      if (!contentDiv) {
        origUpdateLegend();
        return;
      }
      // Build HTML the same way
      var html = '';
      if (revVisible) {
        html += '<h4>Revenue</h4>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#fee08b;border-color:#d4a017;"></div>&lt; $10K</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#fdae61;border-color:#c87f0a;"></div>$10K – $25K</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#f46d43;border-color:#c0392b;"></div>$25K – $50K</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#d73027;border-color:#a01a1a;"></div>$50K – $75K</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#a50026;border-color:#6e001a;"></div>$75K+</div>' +
          '<div style="font-size:11px;color:#888;margin-top:4px;">Circle size = revenue</div>';
        if (newVisible || oldVisible) html += '<hr>';
      }
      if (newVisible && oldVisible) {
        html += '<h4>Price Scale</h4>' +
          Object.entries(bandColors).map(function(e) { return '<div class="legend-item"><div class="legend-dot" style="background:' + e[1].fill + ';border-color:' + e[1].stroke + '"></div>' + e[1].labelNew + '</div>'; }).join('') +
          '<hr>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#999;border:2px solid #666;"></div>Solid = New</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background:#999;border:2px dashed #666;"></div>Dashed = Old</div>';
      } else if (oldVisible) {
        html += '<h4>Old Pricing (by rate)</h4>' +
          '<div style="font-size:11px;color:#888;margin-bottom:6px;">26 listed rates + $8/km for rest</div>' +
          Object.entries(bandColors).map(function(e) { return '<div class="legend-item"><div class="legend-dot" style="background:' + e[1].fill + ';border-color:' + e[1].stroke + ';border-style:dashed;"></div>' + e[1].labelOld + '</div>'; }).join('');
      } else if (newVisible) {
        html += '<h4>New Pricing</h4>' +
          Object.entries(bandColors).map(function(e) { return '<div class="legend-item"><div class="legend-dot" style="background:' + e[1].fill + ';border-color:' + e[1].stroke + '"></div>' + e[1].labelNew + '</div>'; }).join('');
      }
      if (!html) html = '<h4>Toggle a layer above</h4>';
      contentDiv.innerHTML = html;
    };
  }

  // 1b. Make info-panel (pricing/heatmap layer toggles) collapsible on mobile
  var infoPanelEl = document.querySelector('.info-panel');
  if (infoPanelEl && !infoPanelEl.querySelector('.info-toggle')) {
    var infoExistingHTML = infoPanelEl.innerHTML;
    infoPanelEl.innerHTML = '<button class="info-toggle" type="button">Layers & Heatmap</button><div class="info-content">' + infoExistingHTML + '</div>';
    infoPanelEl.querySelector('.info-toggle').addEventListener('click', function(e) {
      e.stopPropagation();
      infoPanelEl.classList.toggle('info-collapsed');
    });
  }

  // 2. Make timeline panel collapsible on mobile
  var tPanel = document.getElementById('timeline-panel');
  if (tPanel) {
    // Add drag handle and wrap content
    var handle = document.createElement('div');
    handle.className = 'timeline-collapse-handle';
    var contentWrap = document.createElement('div');
    contentWrap.className = 'timeline-content';
    // Move all existing children into the wrapper
    while (tPanel.firstChild) {
      contentWrap.appendChild(tPanel.firstChild);
    }
    tPanel.appendChild(handle);
    tPanel.appendChild(contentWrap);

    handle.addEventListener('click', function() {
      tPanel.classList.toggle('timeline-collapsed');
    });
  }

  // 3. Close popups on map tap (better mobile UX)
  map.on('click', function() {
    map.closePopup();
  });

  // 4. Increase marker radius for touch targets
  map.eachLayer(function(layer) {
    if (layer.setRadius && layer.getRadius && layer.getRadius() < 8) {
      layer.setRadius(8);
    }
  });

})();
